name: Build APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Bootstrap Gradle Wrapper
        run: |
          GRADLE_VERSION=8.2
          curl -sL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o gradle.zip
          unzip -q gradle.zip
          "./gradle-${GRADLE_VERSION}/bin/gradle" wrapper --gradle-version "${GRADLE_VERSION}"
          chmod +x gradlew
          rm -rf gradle.zip "gradle-${GRADLE_VERSION}"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk \
            app/build/outputs/apk/debug/ntech-sms-reader-v0.1.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ntech-sms-reader-v0.1
          path: app/build/outputs/apk/debug/ntech-sms-reader-v0.1.apk
          retention-days: 90

      - name: Upload APK on GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/ntech-sms-reader-v0.1.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
