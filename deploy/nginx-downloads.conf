# Nginx — servir l'APK en téléchargement direct
# À ajouter dans la config de prospect.fromcm.com (bloc server existant)

location /ntech/downloads/ {
    alias /var/www/ntech/downloads/;
    types { }
    default_type application/vnd.android.package-archive;
    add_header Content-Disposition 'attachment; filename="ntech-sms-reader.apk"';
    add_header Cache-Control "no-cache";
}

# Créer le dossier sur le VPS (une seule fois) :
#   sudo mkdir -p /var/www/ntech/downloads
#   sudo chown $USER:www-data /var/www/ntech/downloads
#
# Recharger nginx :
#   sudo nginx -t && sudo systemctl reload nginx
#
# Lien client (fixe) :
#   https://prospect.fromcm.com/ntech/downloads/ntech-sms-reader.apk
